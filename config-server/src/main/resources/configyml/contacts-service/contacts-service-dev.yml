# config-server/src/main/resources/config/contacts-service-dev.yml
server:
  port: ${SERVER_PORT:9030}

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:veysel}
    password: ${RABBITMQ_PASSWORD:123}

  cloud:
    openfeign:
      clients:
        auth-service:
          url: ${AUTH_SERVICE_URL:http://localhost:9000}
        user-service:
          url: ${USER_SERVICE_URL:http://localhost:9010}
        mail-service:
          url: ${MAIL_SERVICE_URL:http://localhost:9020}
        chat-service:
          url: ${CHAT_SERVICE_URL:http://localhost:9040}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chat_app_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
#    hikari:
#      maximum-pool-size: ${DB_POOL_SIZE:10}
#      connection-timeout: ${DB_CONNECTION_TIMEOUT:20000}
#      idle-timeout: ${DB_IDLE_TIMEOUT:300000}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
#      password: ${REDIS_PASSWORD:}
#      timeout: ${REDIS_TIMEOUT:2000ms}

  # Development specific settings
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Development URLs
raceapplication:
  url:
    auth: ${AUTH_SERVICE_URL:http://localhost:9000}/
    mail: ${MAIL_SERVICE_URL:http://localhost:9020}/
    user: ${USER_SERVICE_URL:http://localhost:9010}/
    contacts: ${CONTACTS_SERVICE_URL:http://localhost:9030}/
    chat: ${CHAT_SERVICE_URL:http://localhost:9040}/

# JWT Security Configuration (eğer contacts-service de JWT kullanıyorsa)
application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION:3600000}      # 1 saat
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:86400000} # 1 gün

# Development logging
logging:
  level:
    root: INFO
    com.vky: DEBUG
    com.vky.controller: TRACE
    com.vky.service: DEBUG
    org.springframework.web: DEBUG
    org.springframework.boot.web.embedded.tomcat: INFO
    org.springframework.cloud.openfeign: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{36}){cyan} - %msg%n"

# Development actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always