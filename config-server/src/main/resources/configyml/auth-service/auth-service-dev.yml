# config-server/src/main/resources/config/auth-service-dev.yml
server:
  port: ${SERVER_PORT:9000}

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:veysel}
    password: ${RABBITMQ_PASSWORD:123}

  cloud:
    openfeign:
      clients:
        mail-service:
          url: ${MAIL_SERVICE_URL:http://localhost:9020}
        user-service:
          url: ${USER_SERVICE_URL:http://localhost:9010}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chat_app_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}


  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

raceapplication:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: ${JWT_EXPIRATION:3600000} # 1 hour for dev
      refresh-token:
        expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days

# Development logging
logging:
  level:
    com.vky: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always