# config-server/src/main/resources/config/chat-service.yml
spring:
  application:
    name: chat-service

  # MongoDB Configuration (Chat için önerilen)
  data:
    mongodb:
      username: ${MONGODB_USERNAME:veysel}
      password: ${MONGODB_PASSWORD:veysel}
      host: ${MONGODB_HOST:localhost}
      port: ${MONGODB_PORT:27017}
      database: ${MONGODB_DB:chat_app_dev}
      authentication-database: ${MONGODB_AUTH_DB:admin}
      # Connection pooling
#      options:
#        min-connections-per-host: ${MONGODB_MIN_CONNECTIONS:10}
#        connections-per-host: ${MONGODB_MAX_CONNECTIONS:100}
#        server-selection-timeout: ${MONGODB_SERVER_SELECTION_TIMEOUT:30000}
#        connect-timeout: ${MONGODB_CONNECT_TIMEOUT:10000}
#        socket-timeout: ${MONGODB_SOCKET_TIMEOUT:0}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    instance-id: ${spring.application.name}:${server.port}

# Base logging configuration
logging:
  level:
    com.vky: ${LOG_LEVEL:INFO}
    org.springframework.web: ${WEB_LOG_LEVEL:INFO}
    org.springframework.data.mongodb: ${MONGODB_LOG_LEVEL:INFO}
    org.springframework.cloud: ${CLOUD_LOG_LEVEL:INFO}

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

